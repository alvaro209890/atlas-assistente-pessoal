name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: atlas_test
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas -d atlas_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://atlas:atlas_test@localhost:5432/atlas_test
      TEST_DATABASE_URL: postgresql://atlas:atlas_test@localhost:5432/atlas_test
      SESSION_SECRET: ci-only-session-secret-with-more-than-32-characters
      DEEPSEEK_API_KEY: test-key-not-used
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run release:check
      - run: npm audit --omit=dev --audit-level=moderate
      - name: Validate Compose and production images
        run: |
          cp .env.example .env
          docker compose config > /dev/null
          rm .env
          docker build --target api -t atlas-api:ci .
          docker build --target worker -t atlas-worker:ci .
          docker build --target web -t atlas-web:ci .
