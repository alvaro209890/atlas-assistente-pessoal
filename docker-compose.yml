name: atlas

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atlas}
      POSTGRES_USER: ${POSTGRES_USER:-atlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas_local}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  migrate:
    build:
      context: .
      target: api
    restart: "no"
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-atlas}:${POSTGRES_PASSWORD:-atlas_local}@postgres:5432/${POSTGRES_DB:-atlas}
    command: ["npm", "run", "db:migrate"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-atlas}:${POSTGRES_PASSWORD:-atlas_local}@postgres:5432/${POSTGRES_DB:-atlas}
      PORT: 3000
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-atlas}:${POSTGRES_PASSWORD:-atlas_local}@postgres:5432/${POSTGRES_DB:-atlas}
    depends_on:
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_started

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:
